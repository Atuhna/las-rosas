<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Las Rosas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  --bg:#f5f6f4; --panel:#ffffff; --panel2:#f0f2ef; --line:#e2e5e0;
  --ink:#1f2421; --muted:#7a817b; --accent:#3f6b4f; --accent2:#5a8a6a;
  --soil:#8a7a66; --grid:#eceee9;
  --ff-disp:"Space Grotesk",system-ui,sans-serif;
  --ff-body:"Inter",system-ui,sans-serif;
  --lblw:150px;
}
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--ff-body);background:var(--bg);color:var(--ink);overflow:hidden}
.app{display:grid;grid-template-columns:330px 1fr;grid-template-rows:64px 1fr;height:100vh;
  transition:grid-template-columns .22s ease}
.app.panel-hidden{grid-template-columns:0 1fr}
.app.panel-hidden aside{opacity:0;pointer-events:none}

header{grid-column:1/3;display:flex;align-items:center;gap:14px;padding:0 22px;
  background:var(--panel);border-bottom:1px solid var(--line)}
.panel-toggle{background:none;border:1px solid var(--line);color:var(--muted);width:34px;height:34px;
  border-radius:8px;font-size:16px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center}
.panel-toggle:hover{border-color:var(--accent2);color:var(--accent)}
.brandlogo{height:54px;width:auto;flex:none}
.brand{display:flex;flex-direction:column;line-height:1.05}
.brand b{font-family:var(--ff-disp);font-weight:700;font-size:20px;letter-spacing:.3px}
header .stats{margin-left:auto;display:flex;gap:26px}
.stat{text-align:right}
.stat .n{font-family:var(--ff-disp);font-size:20px;font-weight:600;color:var(--accent)}
.stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}

aside{background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;overflow:hidden;transition:opacity .18s}
.filters{padding:18px 18px 8px;border-bottom:1px solid var(--line)}
.fhead{font-family:var(--ff-disp);font-size:12px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:1px}
select,input[type=range]{width:100%}
select{background:var(--panel2);color:var(--ink);border:1px solid var(--line);
  border-radius:7px;padding:8px 10px;font-family:var(--ff-body);font-size:13px;cursor:pointer}
select:focus{outline:2px solid var(--accent2);outline-offset:1px}
.yr-range{float:right;text-transform:none;letter-spacing:0;font-weight:600;color:var(--accent)}
/* slider doble */
.dualslider{position:relative;height:26px;margin-top:4px}
.ds-track{position:absolute;top:11px;left:0;right:0;height:4px;border-radius:2px;background:var(--line)}
.ds-fill{position:absolute;top:11px;height:4px;border-radius:2px;background:var(--accent2)}
.dualslider input[type=range]{position:absolute;top:0;left:0;width:100%;margin:0;
  -webkit-appearance:none;appearance:none;background:none;pointer-events:none;height:26px}
.dualslider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
  pointer-events:auto;width:16px;height:16px;border-radius:50%;background:var(--accent);
  border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3);cursor:pointer;margin-top:0}
.dualslider input[type=range]::-moz-range-thumb{pointer-events:auto;width:16px;height:16px;
  border-radius:50%;background:var(--accent);border:2px solid #fff;cursor:pointer}
.reset{background:none;border:1px solid var(--line);color:var(--muted);border-radius:7px;
  padding:7px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;width:100%}
.reset:hover{border-color:var(--accent2);color:var(--accent)}

.legend{padding:14px 18px;overflow-y:auto;flex:1}
.legend .fhead{margin-bottom:10px}
.lgroup{margin-bottom:12px}
.lgroup-h{display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:1px;
  text-transform:uppercase;color:var(--ink);font-weight:600;margin-bottom:4px;cursor:pointer;
  padding:3px 4px;border-radius:5px}
.lgroup-h:hover{background:var(--panel2)}
.lgroup-h .gdot{width:9px;height:9px;border-radius:50%;flex:none}
.lgroup-h .gct{margin-left:auto;color:var(--muted);font-weight:400;font-size:10px}
.lg{display:flex;align-items:center;gap:9px;padding:4px 0 4px 14px;font-size:12.5px;cursor:pointer;
  border-radius:6px;transition:background .12s}
.lg:hover{background:var(--panel2)}
.lg.off{opacity:.3}
.sw{width:13px;height:13px;border-radius:3px;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
.lg .nm{flex:1}
.lg .ct{color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums}

main{position:relative;overflow:hidden;display:flex;flex-direction:column}
.maparea{position:relative;flex:none;height:var(--map-h,55%);min-height:120px}
#map{position:absolute;inset:0;width:100%;height:100%;background:#e8ebe6}
.splitter{flex:none;height:12px;background:var(--panel2);border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);cursor:row-resize;display:flex;align-items:center;
  justify-content:center;touch-action:none;user-select:none}
.splitter::before{content:"";width:46px;height:4px;border-radius:3px;background:var(--line)}
.splitter:hover::before,.splitter.drag::before{background:var(--accent2)}
.gantt{background:var(--panel);overflow:auto;position:relative;flex:1;min-height:80px}
.gantt.showing-detail{overflow:hidden}
.gantt.showing-detail .gantt-inner{visibility:hidden;height:0;overflow:hidden}
.detail{position:absolute;inset:0;z-index:60;background:var(--panel);display:flex;flex-direction:column;min-height:0}
.detail-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;
  border-bottom:1px solid var(--line);background:var(--panel2);flex:none}
.detail-head b{font-family:var(--ff-disp);font-size:15px;color:var(--accent)}
.detail-head button{background:var(--accent);border:none;height:30px;padding:0 12px;border-radius:7px;
  cursor:pointer;font-size:12px;font-weight:600;color:#fff;display:flex;align-items:center;gap:5px;flex:none}
.detail-head button:hover{background:var(--accent2)}
.detail-body{padding:12px 14px;overflow-y:auto;flex:1;min-height:0;-webkit-overflow-scrolling:touch}
.gantt-inner{min-width:100%;padding:0}
.mapbtns{position:absolute;top:10px;right:10px;z-index:500;display:flex;gap:6px}
.mapbtn{background:rgba(255,255,255,.95);color:var(--ink);border:1px solid var(--line);
  border-radius:7px;padding:7px 11px;font-size:12px;font-family:var(--ff-body);cursor:pointer;
  display:flex;align-items:center;gap:6px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.mapbtn:hover{border-color:var(--accent2);color:var(--accent)}
.mapbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.lotelabel{background:none!important;border:none!important;box-shadow:none!important;padding:0!important;
  white-space:nowrap;pointer-events:none;text-align:center}
.lotelabel::before{display:none!important}
.lotelabel .ll-name{font-family:var(--ff-disp);font-weight:700;font-size:11px;color:#1a1f1c;
  text-shadow:0 1px 2px rgba(255,255,255,.95),-1px 0 2px rgba(255,255,255,.9),1px 0 2px rgba(255,255,255,.9),0 -1px 2px rgba(255,255,255,.9);
  line-height:1.05}
.lotelabel .ll-sub{font-family:var(--ff-body);font-weight:500;font-size:9px;color:#3a423b;
  text-shadow:0 1px 2px rgba(255,255,255,.95),0 0 2px rgba(255,255,255,.9);line-height:1.05;margin-top:1px}
.lotelabel.hidden{display:none}
/* etiqueta grande de módulo (vista por módulo) */
.modlabel{background:rgba(255,255,255,.82)!important;border:1px solid rgba(0,0,0,.12)!important;
  border-radius:6px;padding:2px 8px!important;font-family:var(--ff-disp);font-weight:700;font-size:13px;
  color:#1a1f1c;box-shadow:0 1px 4px rgba(0,0,0,.15)!important;white-space:nowrap;pointer-events:none}
.modlabel::before{display:none!important}
.ghead{position:sticky;top:0;z-index:5;background:var(--panel2);border-bottom:1px solid var(--line);
  display:flex;align-items:center;height:30px;font-family:var(--ff-disp)}
.ghead .lbl{position:sticky;left:0;z-index:6;background:var(--panel2);width:var(--lblw);flex:none;
  padding:0 12px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
  border-right:1px solid var(--line);height:100%;display:flex;align-items:center}
.yr{flex:none;text-align:center;font-size:11px;color:var(--muted);border-right:1px solid var(--grid);
  display:flex;align-items:center;justify-content:center}
.grow{display:flex;align-items:center;height:26px;border-bottom:1px solid var(--grid)}
.grow:hover{background:var(--panel2)}
.grow.sel{background:#e8f0ea}
.glbl{position:sticky;left:0;z-index:4;width:var(--lblw);flex:none;padding:0 12px;font-size:12px;
  background:var(--panel);border-right:1px solid var(--line);height:100%;display:flex;
  align-items:center;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grow:hover .glbl,.grow.sel .glbl{background:inherit}
.ghdr-track{display:flex;flex:1;height:100%}
.yr{cursor:pointer;transition:background .12s}
.yr:hover{background:var(--line)}
.yr.hoy{color:var(--accent);font-weight:700}
.yr.yract{background:var(--accent);color:#fff;font-weight:700}
.yearbanner{position:absolute;top:10px;left:10px;z-index:500;display:flex;align-items:center;gap:8px;
  background:var(--accent);color:#fff;border-radius:7px;padding:6px 8px 6px 12px;font-size:12px;
  font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.yearbanner button{background:rgba(255,255,255,.25);border:none;color:#fff;width:20px;height:20px;
  border-radius:5px;cursor:pointer;font-size:12px;line-height:1}
.yearbanner button:hover{background:rgba(255,255,255,.45)}
.modlegend{position:absolute;bottom:10px;right:10px;z-index:500;background:rgba(255,255,255,.95);
  border:1px solid var(--line);border-radius:8px;padding:9px 12px;box-shadow:0 2px 10px rgba(0,0,0,.12);
  font-size:11px}
.modlegend h4{font-family:var(--ff-disp);font-size:11px;margin-bottom:6px;color:var(--ink);
  text-transform:uppercase;letter-spacing:.5px}
.modlegend .mi{display:flex;align-items:center;gap:7px;padding:2px 0;cursor:pointer}
.modlegend .mi .ms{width:14px;height:14px;border-radius:3px;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
.modlegend .mi.off{opacity:.35}
/* leyenda de cultivos sobre el mapa */
.maplegend{position:absolute;bottom:10px;left:10px;z-index:500;background:rgba(255,255,255,.95);
  border:1px solid var(--line);border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.12);
  max-width:200px;overflow:hidden}
.maplegend .ml-head{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:7px 10px;cursor:pointer;user-select:none}
.maplegend .ml-head b{font-family:var(--ff-disp);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.maplegend .ml-toggle{font-size:10px;color:var(--muted);transition:transform .18s}
.maplegend.collapsed .ml-toggle{transform:rotate(-90deg)}
.maplegend .ml-body{padding:0 10px 9px;max-height:42vh;overflow-y:auto}
.maplegend.collapsed .ml-body{display:none}
.maplegend .ml-item{display:flex;align-items:center;gap:7px;padding:2px 0;font-size:11px;cursor:pointer}
.maplegend .ml-item .mls{width:12px;height:12px;border-radius:3px;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
.maplegend .ml-item.off{opacity:.3}
.maplegend .ml-grp{font-size:8.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
  font-weight:600;margin:6px 0 1px}
.maplegend .ml-grp:first-child{margin-top:2px}
.gbody{position:relative}
.todayline{position:absolute;top:0;bottom:0;width:0;border-left:2px dashed #c0392b;z-index:3;
  pointer-events:none}
.todayline span{position:sticky;top:0;display:inline-block;transform:translateX(-50%);
  background:#c0392b;color:#fff;font-size:8.5px;font-weight:700;letter-spacing:.5px;
  padding:1px 5px;border-radius:0 0 4px 4px;text-transform:uppercase}
.gtrack{position:relative;flex:1;height:100%}
.gap{position:absolute;top:8px;height:10px;border-radius:2px;
  background-image:repeating-linear-gradient(45deg,var(--line) 0,var(--line) 2px,transparent 2px,transparent 5px);
  opacity:.7;z-index:0}
.bar{position:absolute;top:4px;height:18px;border-radius:3px;font-size:10px;color:#1f2421;
  font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:inset 0 -1px 0 rgba(0,0,0,.12);transition:filter .12s,opacity .2s;z-index:1}
.bar .barlbl{font-size:10px;line-height:1;white-space:nowrap;pointer-events:none}
.bar.narrow{overflow:visible}
.bar.narrow .barlbl{position:absolute;left:50%;transform:translateX(-50%);
  font-size:8.5px;padding:0 2px;background:rgba(255,255,255,.82);border-radius:2px;
  color:#1f2421;box-shadow:0 0 0 1px rgba(0,0,0,.06)}
.bar:not(.narrow){overflow:hidden}
.bar:hover{filter:brightness(1.06);z-index:2}
.bar.dim{opacity:.18}
.bar.vig{box-shadow:inset 0 0 0 2px #c0392b}
.bar.fut{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.35) 0,rgba(255,255,255,.35) 3px,transparent 3px,transparent 7px)}
.tip{position:fixed;z-index:1000;background:#ffffff;border:1px solid var(--line);
  border-radius:8px;padding:9px 12px;font-size:12px;pointer-events:none;opacity:0;color:var(--ink);
  transition:opacity .12s;max-width:230px;box-shadow:0 6px 20px rgba(0,0,0,.14)}
.tip b{color:var(--accent);font-family:var(--ff-disp)}
.tip .row{color:var(--muted);margin-top:2px}
.empty{padding:30px;text-align:center;color:var(--muted);font-size:13px}

.leaflet-popup-content-wrapper{background:#fff;color:var(--ink);border-radius:9px;
  border:1px solid var(--line);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.leaflet-popup-tip{background:#fff}
.leaflet-popup-content{margin:11px 13px;font-family:var(--ff-body)}
.pop b{font-family:var(--ff-disp);color:var(--accent);font-size:14px}
.pop .meta{color:var(--muted);font-size:11px;margin:3px 0 7px}
.pop .cur{display:flex;align-items:center;gap:9px;padding:8px 9px;margin-bottom:8px;
  background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:7px}
.pop .cur .cs{width:13px;height:13px;border-radius:3px;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
.pop .cur .cn{font-family:var(--ff-disp);font-weight:600;font-size:13px;color:var(--ink)}
.pop .cur .ce{font-size:10.5px;color:var(--muted);margin-top:1px}
.pop .cur.empty2{display:block;color:var(--muted);font-size:12px;border-left-color:var(--line);font-style:italic}
.pop .crops{display:flex;flex-direction:column;gap:2px;max-height:240px;overflow:auto}
.pop .crops.nopanel{max-height:none;overflow:visible}
.detail .pop{font-size:13px}
.detail .ctab{font-size:11.5px}
.detail .ctab td,.detail .ctab th{padding:4px 7px}
.detail .cur{padding:10px 12px}
.pop .seclbl{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  margin:8px 0 3px;font-weight:600}
.pop .ctab{width:100%;border-collapse:collapse;font-size:10.5px}
.pop .ctab th{text-align:left;color:var(--muted);font-weight:600;font-size:9px;text-transform:uppercase;
  letter-spacing:.5px;padding:2px 5px;border-bottom:1px solid var(--line)}
.pop .ctab td{padding:2px 5px;border-bottom:1px solid var(--grid);white-space:nowrap}
.pop .ctab .c-cult{display:flex;align-items:center;gap:5px;font-weight:600}
.pop .ctab .c-cult .cs{width:9px;height:9px;border-radius:2px;flex:none}
.pop .ctab .c-mat{color:var(--ink);font-size:10px;max-width:90px;overflow:hidden;text-overflow:ellipsis}
.pop .ctab .c-rinde{color:var(--muted);text-align:right}
.pop .cur .mat{font-size:10px;color:var(--accent2);font-weight:600;font-family:var(--ff-body)}
.pop .ctab tr.fut{font-style:italic;color:var(--accent)}
.pop .ctab tr.past{opacity:.85}
.pop .noproj{font-size:11px;color:var(--muted);background:var(--panel2);border:1px dashed var(--line);
  border-radius:6px;padding:7px 9px;font-style:italic}

/* Teléfono en horizontal: pantalla baja y ancha. Mantener layout de 2 columnas, compactar. */
@media(max-height:560px) and (orientation:landscape){
  .app{grid-template-columns:240px 1fr;grid-template-rows:48px 1fr}
  header{height:48px;padding:0 12px;gap:10px}
  .brandlogo{height:36px}
  .brand b{font-size:15px}
  header .stats{gap:14px}
  .stat .n{font-size:15px}.stat .l{font-size:8px}
  .filters{padding:10px 12px 4px}
  .field{margin-bottom:8px}
  .fhead{margin-bottom:7px;font-size:11px}
  select{padding:6px 8px;font-size:12px}
  .legend{padding:8px 12px}
  .lg{padding:3px 0;font-size:11px}
  .splitter{height:16px}
  .mapbtn{padding:6px 9px;font-size:11px}
}
/* Teléfono en VERTICAL: panel como cajón deslizante; mapa y tabla apilados a pantalla completa. */
@media(max-width:720px) and (orientation:portrait){
  .app{grid-template-columns:1fr;grid-template-rows:54px 1fr;height:100vh;height:100dvh}
  header{height:54px;padding:0 10px;gap:8px}
  .panel-toggle{width:34px;height:34px;font-size:17px}
  .brandlogo{height:42px}
  .brand b{font-size:16px}
  header .stats{gap:10px}
  .stat .n{font-size:15px}.stat .l{font-size:8px}
  /* panel como cajón superpuesto */
  aside{position:fixed;top:54px;left:0;bottom:0;width:84vw;max-width:330px;z-index:1200;
    transform:translateX(-102%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.25);
    opacity:1!important;pointer-events:auto!important;overflow-y:auto}
  .app.panel-open aside{transform:translateX(0)}
  .app.panel-hidden{grid-template-columns:1fr}  /* anular el colapso de desktop */
  .scrim{position:fixed;inset:54px 0 0 0;background:rgba(0,0,0,.4);z-index:1100;
    opacity:0;pointer-events:none;transition:opacity .25s}
  .app.panel-open .scrim{opacity:1;pointer-events:auto}
  /* main ocupa todo; mapa y tabla apilados */
  main{grid-column:1;grid-row:2}
  .maparea{height:var(--map-h,46%);min-height:160px}
  .splitter{height:20px}
  .splitter::before{width:60px;height:5px}
  .gantt{min-height:140px}
  /* tabla más legible al tacto */
  main{--lblw:96px}
  .yr{font-size:10px}
  .todayline span{font-size:8px}
  .grow{height:30px}
  .bar{height:22px;top:4px}
  .mapbtn{padding:8px 11px;font-size:12px}
  .maplegend{max-width:62vw}
  .modlegend{font-size:11px;padding:7px 9px}
  /* popup más ancho y legible */
  .leaflet-popup-content{margin:10px 11px;min-width:230px}
  .pop .ctab{font-size:10px}
}
@media(min-width:721px){ .scrim{display:none} }
</style>
</head>
<body>
<div class="app">
  <header>
    <button class="panel-toggle" id="panel-toggle" title="Ocultar/mostrar panel">☰</button>
    <img id="brandlogo" class="brandlogo" alt="Agroveterinaria San Martín"/>
    <div class="brand"><b>Las Rosas</b></div>
    <div class="stats">
      <div class="stat"><div class="n" id="s-lotes">0</div><div class="l">Lotes</div></div>
      <div class="stat"><div class="n" id="s-has">0</div><div class="l">Hectáreas</div></div>
      <div class="stat"><div class="n" id="s-reg">0</div><div class="l">Ciclos</div></div>
    </div>
  </header>

  <aside>
    <div class="filters">
      <div class="fhead">Filtros</div>
      <div class="field">
        <label>Vista del mapa</label>
        <select id="f-view">
          <option value="lote">Por lote</option>
          <option value="modulo">Por módulo</option>
        </select>
      </div>
      <div class="field">
        <label>Módulo</label>
        <select id="f-mod"><option value="">Todos los módulos</option></select>
      </div>
      <div class="field">
        <label>Cultivo</label>
        <select id="f-crop"><option value="">Todos los cultivos</option></select>
      </div>

<script>
function boot(){
const D=window.__DATA__, ROT=D.rotation, GJ=D.geojson, CC=D.cropColors;
const fmt=n=>Math.round(n).toLocaleString('es-AR');
// logo embebido
(function(){const lg=document.getElementById('brandlogo');
  if(lg&&D.logo)lg.src='data:image/png;base64,'+D.logo;})();
const cropName=D.cropNames||{};
const colorOf=c=>CC[c]||'#888';

// fecha de hoy (desde el payload) y su posición temporal
const TODAY=new Date((D.today||'2026-06-22')+'T00:00:00');
const todayY=TODAY.getFullYear();
const todayQ=Math.floor(TODAY.getMonth()/3)+1;
const parseD=s=>new Date(s+'T00:00:00');
// formato mes-año abreviado en español: 2016-07-01 -> "jul-16"
const MESES_ABR=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function fmtMesAnio(s){if(!s)return '—';const d=parseD(s);
  return MESES_ABR[d.getMonth()]+'-'+String(d.getFullYear()).slice(2);}
// índice fraccional de hoy dentro del trimestre (para la línea "hoy")
function todayQIndexFrac(){
  const qStartMonth=(todayQ-1)*3;
  const qStart=new Date(todayY,qStartMonth,1);
  const qEnd=new Date(todayY,qStartMonth+3,1);
  const frac=(TODAY-qStart)/(qEnd-qStart);
  return qIndex(todayY,todayQ)+frac;
}

// timeline range
let yMin=9999,yMax=0;
ROT.forEach(r=>{yMin=Math.min(yMin,+r.Anio_inicio);yMax=Math.max(yMax,+r.Anio_fin);});
const years=[];for(let y=yMin;y<=yMax;y++)years.push(y);
const totalQ=years.length*4;
const qIndex=(y,q)=>(y-yMin)*4+(q-1);

// ¿un registro está vigente hoy?
function esVigente(r){return parseD(r.Fecha_inicio)<=TODAY && TODAY<=parseD(r.Fecha_fin);}
// edad del cultivo actual en años (desde inicio hasta hoy)
function edadAnios(r){
  const ini=parseD(r.Fecha_inicio);
  let a=todayY-ini.getFullYear();
  const m=TODAY.getMonth()-ini.getMonth();
  if(m<0||(m===0&&TODAY.getDate()<ini.getDate()))a--;
  return Math.max(0,a);
}
// edad detallada (años y meses) entre dos fechas; por defecto inicio->hoy
function edadDetalle(fIni,fFin){
  const a=parseD(fIni), b=fFin?parseD(fFin):TODAY;
  let meses=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());
  if(b.getDate()<a.getDate())meses--;
  meses=Math.max(0,meses);
  const y=Math.floor(meses/12), m=meses%12;
  if(y===0)return m+(m===1?' mes':' meses');
  if(m===0)return y+(y===1?' año':' años');
  return y+(y===1?' año':' años')+' y '+m+(m===1?' mes':' meses');
}
// clasificar registro respecto de hoy: 'pasado' | 'actual' | 'futuro'
function faseRot(r){
  if(esVigente(r))return 'actual';
  return parseD(r.Fecha_fin)<TODAY?'pasado':'futuro';
}

// populate filters
const mods=[...new Set(ROT.map(r=>r.Modulo))].filter(m=>m&&m!=='-' ).sort((a,b)=>a-b);
const fMod=document.getElementById('f-mod');
mods.forEach(m=>fMod.insertAdjacentHTML('beforeend',`<option value="${m}">Módulo ${m}</option>`));
const crops=[...new Set(ROT.map(r=>r.Cultivo))].sort();
const fCrop=document.getElementById('f-crop');
crops.forEach(c=>fCrop.insertAdjacentHTML('beforeend',`<option value="${c}">${cropName[c]||c} (${c})</option>`));
const fView=document.getElementById('f-view');

// --- slider doble de rango de campaña ---
const fYmin=document.getElementById('f-year-min');
const fYmax=document.getElementById('f-year-max');
const dsFill=document.getElementById('ds-fill');
const yrRangeLbl=document.getElementById('yr-range');
fYmin.min=fYmax.min=0; fYmin.max=fYmax.max=years.length-1;
fYmin.value=0; fYmax.value=years.length-1;
function yearRange(){ // null si abarca todo
  const a=+fYmin.value, b=+fYmax.value;
  const lo=Math.min(a,b), hi=Math.max(a,b);
  if(lo===0&&hi===years.length-1)return null;
  return [years[lo],years[hi]];
}
function paintDual(){
  const a=Math.min(+fYmin.value,+fYmax.value), b=Math.max(+fYmin.value,+fYmax.value);
  const n=years.length-1;
  dsFill.style.left=(a/n*100)+'%';
  dsFill.style.width=((b-a)/n*100)+'%';
  const rg=yearRange();
  yrRangeLbl.textContent=rg?(rg[0]===rg[1]?rg[0]:rg[0]+'–'+rg[1]):'Todas';
}

// legend agrupada por grupos funcionales
const cropCounts={};ROT.forEach(r=>cropCounts[r.Cultivo]=(cropCounts[r.Cultivo]||0)+1);
const legendEl=document.getElementById('legend');
let isolated=null;       // puede ser un cultivo o un grupo (prefijo 'grp:')
let selectedLote=null;
let mapYear=null;        // año seleccionado para "ver el mapa de ese año"
const GROUPS=D.cropGroups||{};
const groupColor={'Megatérmicas':'#5b9b91','Pastura consociada':'#3d6b4a',
  'Verdeo de invierno':'#cdb04a','Cultivo de gruesa':'#c87f4a'};
Object.keys(GROUPS).forEach(gname=>{
  const members=GROUPS[gname].filter(c=>crops.includes(c));
  if(!members.length)return;
  const gtot=members.reduce((s,c)=>s+(cropCounts[c]||0),0);
  const wrap=document.createElement('div');wrap.className='lgroup';
  const h=document.createElement('div');h.className='lgroup-h';h.dataset.group=gname;
  h.innerHTML=`<span class="gdot" style="background:${groupColor[gname]||'#888'}"></span>${gname}<span class="gct">${gtot}</span>`;
  h.onclick=()=>{const key='grp:'+gname;isolated=isolated===key?null:key;render();};
  wrap.appendChild(h);
  members.forEach(c=>{
    const el=document.createElement('div');el.className='lg';el.dataset.crop=c;
    el.innerHTML=`<span class="sw" style="background:${colorOf(c)}"></span>
      <span class="nm">${cropName[c]||c} <span style="color:var(--muted)">${c}</span></span>
      <span class="ct">${cropCounts[c]}</span>`;
    el.onclick=()=>{isolated=isolated===c?null:c;render();};
    wrap.appendChild(el);
  });
  legendEl.appendChild(wrap);
});
// mapa cultivo -> grupo (para isolation por grupo)
const cropGroupOf={};Object.keys(GROUPS).forEach(g=>GROUPS[g].forEach(c=>cropGroupOf[c]=g));
// ¿el cultivo c está aislado? (soporta grupos)
function isoMatch(c){
  if(!isolated)return true;
  if(isolated.startsWith('grp:'))return cropGroupOf[c]===isolated.slice(4);
  return c===isolated;
}

// map — fondo liso por defecto; capa satelital opcional (oculta al inicio)
// lote -> módulo (para vista por módulo)
const loteModulo={};ROT.forEach(r=>{if(!(r.Lote in loteModulo))loteModulo[r.Lote]=r.Modulo;});
const MODCOL=D.moduloColors||{};
function colorModulo(lote){return MODCOL[String(loteModulo[lote])]||'#9aa48a';}

// centroide interior robusto (punto representativo dentro del polígono)
function ringsOf(geom){
  if(geom.type==='Polygon')return geom.coordinates;
  if(geom.type==='MultiPolygon'){ // anillo exterior del polígono de mayor área
    let best=null,ba=-1;
    geom.coordinates.forEach(poly=>{const r=poly[0];const a=Math.abs(ringArea(r));if(a>ba){ba=a;best=poly;}});
    return best||geom.coordinates[0];
  }
  return [];
}
function ringArea(r){let a=0;for(let i=0,j=r.length-1;i<r.length;j=i++){a+=(r[j][0]+r[i][0])*(r[j][1]-r[i][1]);}return a/2;}
function polyCentroid(ring){ // centroide de área
  let x=0,y=0,a=0;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const f=ring[j][0]*ring[i][1]-ring[i][0]*ring[j][1];
    x+=(ring[j][0]+ring[i][0])*f; y+=(ring[j][1]+ring[i][1])*f; a+=f;
  }
  a*=0.5; if(Math.abs(a)<1e-12)return [ring[0][0],ring[0][1]];
  return [x/(6*a),y/(6*a)];
}
function pointInPoly(pt,ring){let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    if(((yi>pt[1])!==(yj>pt[1]))&&(pt[0]<(xj-xi)*(pt[1]-yi)/(yj-yi)+xi))inside=!inside;
  } return inside;}
function labelPoint(geom){
  const rings=ringsOf(geom); const outer=rings[0]||[];
  let c=polyCentroid(outer);
  if(pointInPoly(c,outer))return [c[1],c[0]]; // [lat,lng]
  // si el centroide cae fuera, buscar mejor punto por grilla
  let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
  outer.forEach(p=>{minX=Math.min(minX,p[0]);maxX=Math.max(maxX,p[0]);minY=Math.min(minY,p[1]);maxY=Math.max(maxY,p[1]);});
  let best=c,bestD=-1;
  for(let gx=1;gx<=8;gx++)for(let gy=1;gy<=8;gy++){
    const px=minX+(maxX-minX)*gx/9, py=minY+(maxY-minY)*gy/9;
    if(!pointInPoly([px,py],outer))continue;
    // distancia mínima al borde (queremos el más interior)
    let d=1e9;for(let i=0,j=outer.length-1;i<outer.length;j=i++){
      d=Math.min(d,Math.hypot(px-outer[i][0],py-outer[i][1]));}
    if(d>bestD){bestD=d;best=[px,py];}
  }
  return [best[1],best[0]];
}

function activeFilters(){
  return {mod:fMod.value, crop:fCrop.value, yr:yearRange(), iso:isolated, view:fView.value};
}
function inYr(r,yr){ if(!yr)return true; return +r.Anio_inicio<=yr[1] && +r.Anio_fin>=yr[0]; }
// which lotes are visible given module+crop+range filters
function loteMatches(lote,f){
  const recs=ROT.filter(r=>r.Lote===lote);
  if(!recs.length) return false;
  if(f.mod && !recs.some(r=>r.Modulo===f.mod)) return false;
  let pool=recs;
  if(f.crop) pool=pool.filter(r=>r.Cultivo===f.crop);
  if(f.iso) pool=pool.filter(r=>isoMatch(r.Cultivo));
  if(f.yr) pool=pool.filter(r=>inYr(r,f.yr));
  return pool.length>0;
}
function featStyle(feat){
  const lote=feat.properties.lote;const f=activeFilters();
  const on=loteMatches(lote,f);
  const sel=lote===selectedLote;
  // cultivo dominante. Si hay un año seleccionado (mapYear), el del cultivo vigente ese año.
  let recs=ROT.filter(r=>r.Lote===lote);
  let col;
  if(f.view==='modulo'){
    col=colorModulo(lote);
  }else if(mapYear!=null){
    // cultivo presente en mapYear (el que más trimestres ocupa ese año)
    const enAnio=recs.filter(r=>+r.Anio_inicio<=mapYear && +r.Anio_fin>=mapYear)
      .sort((a,b)=>a.Fecha_inicio<b.Fecha_inicio?1:-1);
    col=enAnio.length?colorOf(enAnio[0].Cultivo):'#d8dcd5';
  }else{
    let rr=recs.slice();
    if(f.yr)rr=rr.filter(r=>inYr(r,f.yr));
    if(f.crop)rr=rr.filter(r=>r.Cultivo===f.crop);
    if(f.iso)rr=rr.filter(r=>isoMatch(r.Cultivo));
    rr.sort((a,b)=>(a.Fecha_inicio<b.Fecha_inicio?1:-1));
    col=rr.length?colorOf(rr[0].Cultivo):'#5a6347';
  }
  // visibilidad de la etiqueta
  const tt=labelMarkers&&labelMarkers[lote];
  if(tt){const el=tt.getElement&&tt.getElement();
    if(el){el.classList.toggle('hidden',!(on&&labelsOn));}}
  return {color:sel?'#1f2421':(on?'#ffffff':'#c8ccc6'),
    weight:sel?2.5:(on?1.2:0.5),
    fillColor:col, fillOpacity:on?0.88:0.05,
    opacity:on?1:0.4};
}

function popupHtml(lote,p,inPanel){
  let recs=ROT.filter(r=>r.Lote===lote).slice()
    .sort((a,b)=>a.Fecha_inicio<b.Fecha_inicio?-1:1);
  const actual=recs.find(esVigente);
  const pasados=recs.filter(r=>faseRot(r)==='pasado').sort((a,b)=>a.Fecha_inicio<b.Fecha_inicio?1:-1);
  const futuros=recs.filter(r=>faseRot(r)==='futuro').sort((a,b)=>a.Fecha_inicio<b.Fecha_inicio?-1:1);
  const rinde=r=>r.Rinde?String(r.Rinde):'—';
  const material=r=>r.Hibrido?String(r.Hibrido):'—';
  let actualHtml='';
  if(actual){
    const mat=actual.Hibrido?` · <span class="mat">${actual.Hibrido}</span>`:'';
    actualHtml=`<div class="cur"><span class="cs" style="background:${colorOf(actual.Cultivo)}"></span>
      <div><div class="cn">${cropName[actual.Cultivo]||actual.Cultivo}${mat}</div>
      <div class="ce">Sembrado ${fmtMesAnio(actual.Fecha_inicio)} · <b>${edadDetalle(actual.Fecha_inicio,null)}</b> en el lote</div></div></div>`;
  }else{
    actualHtml=`<div class="cur empty2">Sin cultivo vigente hoy</div>`;
  }
  // tabla de ciclos: Cultivo | Material | FI | FF | Edad | Rinde
  const fila=(r,cls)=>{
    const dur=edadDetalle(r.Fecha_inicio,r.Fecha_fin);
    return `<tr class="${cls}">
      <td class="c-cult"><span class="cs" style="background:${colorOf(r.Cultivo)}"></span>${r.Cultivo}</td>
      <td class="c-mat">${material(r)}</td>
      <td>${fmtMesAnio(r.Fecha_inicio)}</td><td>${fmtMesAnio(r.Fecha_fin)}</td>
      <td>${dur}</td><td class="c-rinde">${rinde(r)}</td></tr>`;
  };
  function tabla(titulo,arr,cls){
    if(!arr.length)return '';
    return `<div class="seclbl">${titulo}</div>
      <table class="ctab"><thead><tr><th>Cultivo</th><th>Material</th><th>FI</th><th>FF</th><th>Edad</th><th>Rinde</th></tr></thead>
      <tbody>${arr.map(r=>fila(r,cls)).join('')}</tbody></table>`;
  }
  let futHtml;
  if(futuros.length){
    futHtml=tabla('Próximos cultivos (planificado)',futuros,'fut');
  }else if(actual){
    futHtml=`<div class="seclbl">Próximos cultivos (planificado)</div>
      <div class="noproj">No hay rotación futura definida. Se proyecta continuidad del cultivo actual
      (<b>${cropName[actual.Cultivo]||actual.Cultivo}</b>).</div>`;
  }else{
    futHtml=`<div class="seclbl">Próximos cultivos (planificado)</div>
      <div class="noproj">No hay rotación futura definida.</div>`;
  }
  const head=inPanel?'':`<b>${lote}</b>`;
  const cropsCls=inPanel?'crops nopanel':'crops';
  return `<div class="pop">${head}
    <div class="meta">Módulo ${p.Modulo||'—'} · ${fmt(p.Sup)} ha · ${recs.length} ciclos</div>
    ${actualHtml}
    <div class="${cropsCls}">
      ${tabla('Antecesores (más reciente primero)',pasados,'past')}
      ${futHtml}
    </div></div>`;
}
function cssId(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}

// gantt
const gantt=document.getElementById('gantt');
function buildGantt(){
  const f=activeFilters();
  // ordered lotes: by module then name, only those present in ROT
  const loteMeta={};
  ROT.forEach(r=>{if(!loteMeta[r.Lote])loteMeta[r.Lote]={mod:r.Modulo,has:r.Hectareas,chacra:r.Chacra};});
  let lotes=Object.keys(loteMeta).sort((a,b)=>{
    const ma=+loteMeta[a].mod||99,mb=+loteMeta[b].mod||99;
    return ma-mb||a.localeCompare(b);});
  if(f.mod)lotes=lotes.filter(l=>loteMeta[l].mod===f.mod);
  lotes=lotes.filter(l=>loteMatches(l,f));

  // --- Rango de años visible: el slider doble define la ventana temporal ---
  let visMin=yMin, visMax=yMax;
  if(f.yr){ visMin=Math.max(yMin,f.yr[0]); visMax=Math.min(yMax,f.yr[1]); }
  const visYears=[];for(let y=visMin;y<=visMax;y++)visYears.push(y);
  const visQ=visYears.length*4;
  const vIndex=(y,q)=>(y-visMin)*4+(q-1);  // índice en la escala visible

  // ancho mínimo por año para que NO se solapen; si no caben, el Gantt scrollea horizontal
  const minYearPx=(window.innerWidth<=720)?42:48;
  const trackMinPx=visYears.length*minYearPx;        // ancho mínimo del área temporal
  const abrev=(window.innerWidth<=720);              // móvil: año abreviado '13
  // header (años visibles, clicables para ver ese año en el mapa)
  let head=`<div class="ghead"><div class="lbl">Lote · ${lotes.length}</div><div class="ghdr-track" style="min-width:${trackMinPx}px">`;
  const yrW=`${(100/visYears.length)}%`;
  visYears.forEach(y=>{
    const hoy=y===todayY?' hoy':'';
    const act=(mapYear===y)?' yract':'';
    const lbl=abrev?("'"+String(y).slice(2)):y;
    head+=`<div class="yr${hoy}${act}" data-year="${y}" style="flex:0 0 ${yrW};width:${yrW}">${lbl}</div>`;});
  head+='</div></div>';

  // posición de la línea "hoy" (solo si está dentro del rango visible)
  let todayLine='';
  if(todayY>=visMin&&todayY<=visMax){
    const tf=todayQIndexFrac();
    const leftPct=( (todayY-visMin)*4 + (todayQ-1) + (tf-Math.floor(tf)) )/visQ*100;
    todayLine=`<div class="todayline" style="left:calc(var(--lblw) + (100% - var(--lblw))*${leftPct/100})"><span>hoy</span></div>`;
  }

  let body='';
  if(!lotes.length){body=`<div class="empty">Ningún lote coincide con los filtros seleccionados.</div>`;}
  lotes.forEach(lote=>{
    const sel=lote===selectedLote?' sel':'';
    let recs=ROT.filter(r=>r.Lote===lote)
      .sort((a,b)=>a.Fecha_inicio<b.Fecha_inicio?-1:1);

    // --- huecos sin cultivo: tramos no cubiertos dentro del rango visible ---
    let gaps='';
    const ocup=recs.map(r=>[vIndex(+r.Anio_inicio,+r.Trimestre_inicio),
                            vIndex(+r.Anio_fin,+r.Trimestre_fin)+1])
      .map(([a,b])=>[Math.max(0,a),Math.min(visQ,b)])
      .filter(([a,b])=>b>a).sort((x,y)=>x[0]-y[0]);
    let cursor=0;
    ocup.forEach(([a,b])=>{
      if(a>cursor){const left=cursor/visQ*100,w=(a-cursor)/visQ*100;
        gaps+=`<div class="gap" style="left:${left}%;width:${w}%" title="Sin cultivo (barbecho)"></div>`;}
      cursor=Math.max(cursor,b);
    });

    const bars=recs.map(r=>{
      const a0=vIndex(+r.Anio_inicio,+r.Trimestre_inicio);
      const a1=vIndex(+r.Anio_fin,+r.Trimestre_fin)+1;
      const c0=Math.max(0,a0), c1=Math.min(visQ,a1);
      if(c1<=0||c0>=visQ) return '';
      const left=(c0/visQ*100), w=((c1-c0)/visQ*100);
      const dim=(f.iso&&!isoMatch(r.Cultivo))||(f.crop&&r.Cultivo!==f.crop)?' dim':'';
      const vig=esVigente(r)?' vig':'';
      const fut=faseRot(r)==='futuro'?' fut':'';
      const narrow=w<6?' narrow':'';   // barras angostas: sigla con estilo reducido
      return `<div class="bar${dim}${vig}${fut}${narrow}" style="left:${left}%;width:${w}%;background:${colorOf(r.Cultivo)}"
        data-c="${r.Cultivo}" data-l="${lote}" data-p="${r.Anio_inicio}/${r.Trimestre_inicio}–${r.Anio_fin}/${r.Trimestre_fin}"
        data-h="${r.Hectareas}"><span class="barlbl">${r.Cultivo}</span></div>`;
    }).join('');
    body+=`<div class="grow${sel}" id="row-${cssId(lote)}" data-lote="${lote}">
      <div class="glbl" title="${lote} · Mód ${loteMeta[lote].mod} · ${fmt(loteMeta[lote].has)} ha">${lote}</div>
      <div class="gtrack" style="min-width:${trackMinPx}px">${gaps}${bars}</div></div>`;
  });
  gantt.innerHTML=head+`<div class="gbody" style="min-width:calc(var(--lblw) + ${trackMinPx}px)">${todayLine}${body}</div>`;

  // bind bar tooltips + row click
  gantt.querySelectorAll('.bar').forEach(b=>{
    b.onmouseenter=e=>showTip(`<b>${cropName[b.dataset.c]||b.dataset.c}</b>
      <div class="row">${b.dataset.l}</div>
      <div class="row">${b.dataset.p} · ${fmt(b.dataset.h)} ha</div>`,e);
    b.onmousemove=e=>moveTip(e);b.onmouseleave=hideTip;
  });
  gantt.querySelectorAll('.grow').forEach(r=>{
    r.querySelector('.glbl').onclick=()=>{const l=r.dataset.lote;
      selectedLote=l;render();focusLote(l);
      const ft=GJ.features.find(f=>f.properties.lote===l);
      if(ft)showDetail(l,ft.properties);};
  });
  // clic en un año del encabezado: pinta el mapa con los cultivos de ese año
  gantt.querySelectorAll('.yr[data-year]').forEach(y=>{
    y.style.cursor='pointer';
    y.title='Ver cultivos de '+y.dataset.year+' en el mapa';
    y.onclick=()=>{const yy=+y.dataset.year;mapYear=(mapYear===yy)?null:yy;
      if(fView.value==='modulo')fView.value='lote'; // el modo año pinta por cultivo
      render();updateYearBanner();};
  });
}

  const b=document.getElementById('yearbanner');if(!b)return;
  if(mapYear!=null){b.style.display='flex';b.querySelector('span').textContent='Mapa: campaña '+mapYear;}
  else b.style.display='none';

function updateStats(){
  const f=activeFilters();
  const lotes=[...new Set(ROT.map(r=>r.Lote))].filter(l=>loteMatches(l,f));
  let has=0;GJ.features.forEach(ft=>{if(lotes.includes(ft.properties.lote))has+=ft.properties.Sup;});
  let regs=ROT.filter(r=>lotes.includes(r.Lote));
  if(f.crop)regs=regs.filter(r=>r.Cultivo===f.crop);
  if(f.iso)regs=regs.filter(r=>isoMatch(r.Cultivo));
  if(f.yr)regs=regs.filter(r=>inYr(r,f.yr));
  document.getElementById('s-lotes').textContent=lotes.length;
  document.getElementById('s-has').textContent=fmt(has);
  document.getElementById('s-reg').textContent=regs.length;
}

    el.classList.toggle('off',isolated&&!active&&!(isolated.startsWith('grp:')===false&&cropGroupOf[isolated]===el.dataset.group));
  });
}

fYmin.oninput=onDual;fYmax.oninput=onDual;
document.getElementById('reset').onclick=()=>{fMod.value='';fCrop.value='';fView.value='lote';
  fYmin.value=0;fYmax.value=years.length-1;paintDual();
  isolated=null;selectedLote=null;mapYear=null;updateYearBanner();
  map.fitBounds(layer.getBounds(),{padding:[30,30]});render();};
// cerrar el modo "mapa de año"
document.getElementById('yearbanner-close').onclick=()=>{mapYear=null;updateYearBanner();render();};

// --- Botón ocultar/mostrar panel ---
const appEl=document.querySelector('.app');
function isMobile(){return window.matchMedia&&window.matchMedia('(max-width:720px)').matches;}
document.getElementById('panel-toggle').onclick=()=>{
  if(isMobile()){appEl.classList.toggle('panel-open');}
  else{appEl.classList.toggle('panel-hidden');}
  setTimeout(()=>{if(map&&map.invalidateSize)map.invalidateSize();},260);
};
// cerrar cajón al tocar el fondo oscuro
const scrim=document.getElementById('scrim');
if(scrim)scrim.onclick=()=>appEl.classList.remove('panel-open');

// --- Botón fondo satelital (apagado por defecto) ---
const btnSat=document.getElementById('btn-sat');
function setSat(on){satOn=on;btnSat.classList.toggle('on',on);
  if(on){satLayer.addTo(map);}else{map.removeLayer(satLayer);}}
btnSat.onclick=()=>setSat(!satOn);
setSat(false);

// --- Botón etiquetas de lote ---
const btnLbl=document.getElementById('btn-labels');
function setLabels(on){labelsOn=on;btnLbl.classList.toggle('on',on);applyStyles();}
btnLbl.onclick=()=>setLabels(!labelsOn);
setLabels(true);

// --- Colapsar/expandir leyenda de cultivos del mapa ---
const mapLeg=document.getElementById('maplegend');
document.getElementById('ml-head').onclick=()=>mapLeg.classList.toggle('collapsed');
// en pantallas chicas arranca colapsada para no tapar el mapa
if(window.matchMedia&&window.matchMedia('(max-width:720px)').matches){mapLeg.classList.add('collapsed');}

// --- Divisor arrastrable mapa/tabla ---
(function(){
  const main=document.querySelector('main'), sp=document.getElementById('splitter'),
        area=document.getElementById('maparea');
  let dragging=false;
  function setH(px){
    const total=main.clientHeight, spH=sp.offsetHeight;
    const min=120, max=total-spH-90;
    const clamped=Math.max(min,Math.min(max,px));
    area.style.height=clamped+'px';
    if(map&&map.invalidateSize)map.invalidateSize();
  }
  function pointerY(e){return (e.touches&&e.touches[0])?e.touches[0].clientY:e.clientY;}
  function down(e){dragging=true;sp.classList.add('drag');e.preventDefault();}
  function move(e){if(!dragging)return;
    const top=main.getBoundingClientRect().top;
    setH(pointerY(e)-top);}
  function up(){dragging=false;sp.classList.remove('drag');}
  sp.addEventListener('mousedown',down);
  window.addEventListener('mousemove',move);
  window.addEventListener('mouseup',up);
  sp.addEventListener('touchstart',down,{passive:false});
  window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('touchend',up);
  // recalcular mapa al rotar/redimensionar
  window.addEventListener('resize',()=>{if(map&&map.invalidateSize)map.invalidateSize();});
})();

paintDual();
render();
}

// Arranque robusto: espera DOM + Leaflet (con reintento de CDN) y reporta errores en pantalla.
function showError(msg){
  var m=document.getElementById('map');
  if(m)m.innerHTML='<div style="padding:28px;color:#1f2421;font-family:sans-serif;max-width:520px">'+
    '<b style="color:#3f6b4f;font-size:16px">No se pudo iniciar el mapa</b><br><br>'+msg+'</div>';
}
function start(){
  try{
    if(typeof L==='undefined'){throw new Error('Leaflet no cargó');}
    boot();
  }catch(e){
    showError('Detalle técnico: '+(e&&e.message?e.message:e)+
      '.<br><br>Si estás abriendo el archivo sin conexión, el mapa base y la librería del mapa necesitan internet la primera vez.');
    console.error(e);
  }
}
function waitLeaflet(tries){
  if(typeof L!=='undefined'){start();return;}
  if(tries<=0){
    // intento de respaldo: cargar Leaflet desde otra CDN
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js';
    s.onload=start;
    s.onerror=function(){showError('No se pudo descargar la librería del mapa (Leaflet). Verificá tu conexión a internet.');};
    document.head.appendChild(s);
    return;
  }
  setTimeout(function(){waitLeaflet(tries-1);},120);
}
function ready(){waitLeaflet(40);} // ~5s de margen
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',ready);}
else{ready();}
</script>
